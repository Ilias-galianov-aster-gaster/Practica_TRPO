<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список дел</title>
    <style>
        body { font-family: Arial; margin: 40px; background-color: #e8e8e8; }
        h1 { color: #0044cc; }
        ul { list-style: none; padding: 0; }
        li { margin: 10px 0; background: #f9f9f9; padding: 10px; }
        .date { font-size: 12px; color: #777; }
        a { margin-left: 8px; text-decoration: none; color: #0055cc; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Мои задачи</h1>
    <ul>
        {% for task in tasks %}
        <li>
            {{ task.text }} — <span class="date">{{ task.date }}</span>
            <a href="/edit/{{ loop.index0 }}">Редактировать</a>
            <a href="/delete/{{ loop.index0 }}">Удалить</a>
        </li>
        {% endfor %}
    </ul>

    <h2>Добавить задачу</h2>
    <form method="POST" action="/add">
        <input type="text" name="task" placeholder="Новая задача" required>
        <button type="submit">Добавить</button>
    </form>

    <p><a href="/clear_all">Очистить всё</a></p>
</body>
</html>
